<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAASpocolypse Admin</title>
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@500;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FFFDF5; font-family: 'DM Sans', sans-serif; color: #000; min-height: 100vh; }
  .page { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }
  h1 { font-family: 'Archivo Black', sans-serif; font-size: 32px; margin-bottom: 24px; }

  /* login */
  .login-box {
    max-width: 400px; margin: 120px auto; background: #FFD166;
    border: 3px solid #000; box-shadow: 6px 6px 0 #000; padding: 32px;
  }
  .login-box h2 { font-family: 'Archivo Black', sans-serif; font-size: 22px; margin-bottom: 16px; }
  .login-input {
    width: 100%; padding: 12px 16px; border: 3px solid #000; font-size: 16px;
    font-family: 'JetBrains Mono', monospace; background: #fff; outline: none; margin-bottom: 12px;
  }
  .login-btn {
    width: 100%; padding: 12px; border: 3px solid #000; box-shadow: 4px 4px 0 #000;
    background: #000; color: #FFD166; font-family: 'Archivo Black', sans-serif;
    font-size: 16px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
  }
  .login-btn:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #000; }

  /* stats row */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat {
    border: 3px solid #000; box-shadow: 4px 4px 0 #000; padding: 16px; text-align: center;
  }
  .stat:nth-child(1) { background: #C3F73A; }
  .stat:nth-child(2) { background: #A6FAFF; }
  .stat:nth-child(3) { background: #FF9ECD; }
  .stat:nth-child(4) { background: #FFD166; }
  .stat .num { font-family: 'Archivo Black', sans-serif; font-size: 36px; line-height: 1; }
  .stat .lbl { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

  /* winner section */
  .winner-section { margin-bottom: 24px; display: flex; gap: 12px; align-items: center; }
  .pick-btn {
    padding: 14px 28px; border: 3px solid #000; box-shadow: 4px 4px 0 #000;
    background: #FF6B6B; font-family: 'Archivo Black', sans-serif; font-size: 16px;
    cursor: pointer; color: #000; transition: transform 0.15s, box-shadow 0.15s;
  }
  .pick-btn:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #000; }
  .winner-result {
    border: 3px solid #000; background: #C3F73A; padding: 12px 20px;
    font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; display: none;
  }

  /* table */
  .table-wrap {
    border: 3px solid #000; box-shadow: 6px 6px 0 #000; overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th {
    background: #000; color: #C3F73A; padding: 12px 16px; text-align: left;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  td { padding: 10px 16px; border-bottom: 1px solid #e0e0d0; }
  tr:hover { background: #f0f0e5; }
  .platform-tag {
    display: inline-block; padding: 2px 8px; border: 2px solid #000;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; margin: 1px;
  }
  .platform-tag.twitter { background: #A6FAFF; }
  .platform-tag.linkedin { background: #C3F73A; }
  .platform-tag.facebook { background: #FFD166; }
  .platform-tag.threads { background: #FF9ECD; }
  .platform-tag.instagram { background: #B892FF; }
  .points-cell { font-family: 'Archivo Black', sans-serif; font-size: 18px; }
  .hidden { display: none; }
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-box">
    <h2>SAASpocolypse Admin</h2>
    <input type="password" class="login-input" id="adminKey" placeholder="Admin key">
    <button class="login-btn" onclick="login()">Enter</button>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="hidden">
  <div class="page">
    <h1>SAASpocolypse Giveaway Admin</h1>

    <div class="stats">
      <div class="stat"><div class="num" id="statParticipants">—</div><div class="lbl">Participants</div></div>
      <div class="stat"><div class="num" id="statPoints">—</div><div class="lbl">Total Entries</div></div>
      <div class="stat"><div class="num" id="statShares">—</div><div class="lbl">Total Shares</div></div>
      <div class="stat"><div class="num" id="statReferrals">—</div><div class="lbl">Referrals</div></div>
    </div>

    <div class="winner-section">
      <button class="pick-btn" onclick="pickWinner()">Pick Random Winner</button>
      <div class="winner-result" id="winnerResult"></div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Email</th>
            <th>Code</th>
            <th>Points</th>
            <th>Shared On</th>
            <th>Referrals</th>
            <th>Signed Up</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let adminKey = '';

function login() {
  adminKey = document.getElementById('adminKey').value;
  loadData();
}

async function loadData() {
  try {
    const res = await fetch('/api/saaspocolypse-admin', {
      headers: { 'x-admin-key': adminKey },
    });
    if (!res.ok) { alert('Invalid admin key'); return; }
    const data = await res.json();

    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');

    document.getElementById('statParticipants').textContent = data.total;
    document.getElementById('statPoints').textContent = data.total_points;
    document.getElementById('statShares').textContent = data.total_shares;
    document.getElementById('statReferrals').textContent = data.total_referrals;

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = data.participants.map((p, i) => `
      <tr>
        <td>${i + 1}</td>
        <td>${p.email}</td>
        <td style="font-family: 'JetBrains Mono', monospace; font-size: 12px;">${p.share_code}</td>
        <td class="points-cell">${p.points}</td>
        <td>${p.platforms_shared.map(pl =>
          `<span class="platform-tag ${pl}">${pl}</span>`
        ).join('') || '—'}</td>
        <td style="text-align: center;">${p.referral_count || '—'}</td>
        <td style="font-size: 12px;">${new Date(p.created_at).toLocaleDateString()}</td>
      </tr>
    `).join('');
  } catch (e) {
    alert('Failed to load data');
  }
}

async function pickWinner() {
  if (!confirm('Pick a random winner? (weighted by points)')) return;

  const res = await fetch('/api/saaspocolypse-admin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
    body: JSON.stringify({ action: 'pick_winner' }),
  });
  const data = await res.json();

  if (data.winner) {
    const el = document.getElementById('winnerResult');
    el.style.display = 'block';
    el.textContent = `WINNER: ${data.winner.email} (${data.winner.points} pts) — ${data.total_eligible} eligible, ${data.total_entries} total entries`;
  } else {
    alert(data.error || 'No eligible participants');
  }
}
</script>

</body>
</html>
