<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 370" width="1000" height="370" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" role="img" aria-label="Steve Kaplan — solo operator and builder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1118"/>
      <stop offset="1" stop-color="#0b0d12"/>
    </linearGradient>
    <radialGradient id="amber" cx="9%" cy="14%" r="60%">
      <stop offset="0" stop-color="#f5a623" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pink" cx="93%" cy="22%" r="55%">
      <stop offset="0" stop-color="#f85d7f" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#f85d7f" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <radialGradient id="gridmask" cx="30%" cy="46%" r="62%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
    <mask id="gm"><rect width="1000" height="370" fill="url(#gridmask)"/></mask>
  </defs>

  <rect width="1000" height="370" rx="18" fill="url(#bg)"/>
  <rect width="1000" height="370" rx="18" fill="url(#grid)" mask="url(#gm)"/>
  <rect width="1000" height="370" rx="18" fill="url(#amber)"/>
  <rect width="1000" height="370" rx="18" fill="url(#pink)"/>
  <rect x="0.75" y="0.75" width="998.5" height="368.5" rx="18" fill="none" stroke="#2a3340" stroke-opacity="0.85"/>

  <!-- brand diamond motif -->
  <g transform="rotate(45 838 148)">
    <rect x="763" y="73" width="150" height="150" rx="12" fill="none" stroke="#f5a623" stroke-opacity="0.22" stroke-width="1.5"/>
    <rect x="803" y="113" width="70" height="70" rx="8" fill="none" stroke="#f85d7f" stroke-opacity="0.20" stroke-width="1.5"/>
    <rect x="828" y="138" width="20" height="20" rx="3" fill="#f5a623" fill-opacity="0.18"/>
  </g>

  <!-- kicker -->
  <text x="58" y="68" font-family="'SFMono-Regular',Consolas,'Liberation Mono',monospace" font-size="14" letter-spacing="4.5" fill="#f5a623">SOLO OPERATOR · FORT LAUDERDALE</text>

  <!-- name -->
  <text x="55" y="153" font-size="78" font-weight="800" letter-spacing="-2.5" fill="#eef1f6">STEVE</text>
  <text x="55" y="231" font-size="78" font-weight="800" letter-spacing="-2.5" fill="none" stroke="#f85d7f" stroke-width="1.4">KAPLAN</text>

  <!-- tagline -->
  <text x="58" y="280" font-size="21" font-weight="500" fill="#d3dae3">I don&apos;t hand you a strategy deck.</text>
  <text x="58" y="309" font-size="21" font-weight="500" fill="#d3dae3">I <tspan fill="#f5a623" font-weight="700">build the system</tspan> that executes it.</text>

  <!-- stat chips -->
  <g font-family="'SFMono-Regular',Consolas,'Liberation Mono',monospace" font-size="14.5">
    <g>
      <rect x="56" y="330" width="176" height="34" rx="17" fill="#ffffff" fill-opacity="0.04" stroke="#2a3340"/>
      <text x="74" y="352" fill="#8d97a6"><tspan fill="#f5a623" font-weight="700">$50M+</tspan> ad spend</text>
    </g>
    <g>
      <rect x="244" y="330" width="158" height="34" rx="17" fill="#ffffff" fill-opacity="0.04" stroke="#2a3340"/>
      <text x="262" y="352" fill="#8d97a6"><tspan fill="#eef1f6" font-weight="700">3.2x</tspan> avg ROAS</text>
    </g>
    <g>
      <rect x="414" y="330" width="132" height="34" rx="17" fill="#ffffff" fill-opacity="0.04" stroke="#2a3340"/>
      <text x="432" y="352" fill="#8d97a6"><tspan fill="#eef1f6" font-weight="700">100+</tspan> clients</text>
    </g>
    <g>
      <rect x="558" y="330" width="244" height="34" rx="17" fill="#ffffff" fill-opacity="0.04" stroke="#2a3340"/>
      <text x="576" y="352" fill="#8d97a6"><tspan fill="#f85d7f" font-weight="700">9+</tspan> products shipped solo</text>
    </g>
  </g>
</svg>
