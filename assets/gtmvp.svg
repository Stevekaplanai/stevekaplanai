<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" width="1000" height="260" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" role="img" aria-label="GTMVP — the paid media OS. Free Smart Bidding Audit, $129 Diagnostic, done-for-you Rebuild with a 20% CPA guarantee.">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12151d"/>
      <stop offset="1" stop-color="#0d1016"/>
    </linearGradient>
    <radialGradient id="glow" cx="6%" cy="0%" r="58%">
      <stop offset="0" stop-color="#f5a623" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="260" rx="16" fill="url(#card)"/>
  <rect width="1000" height="260" rx="16" fill="url(#glow)"/>
  <rect x="0.75" y="0.75" width="998.5" height="258.5" rx="16" fill="none" stroke="#2a3340" stroke-opacity="0.9"/>

  <!-- LEFT -->
  <g>
    <rect x="40" y="30" width="312" height="28" rx="14" fill="none" stroke="#f5a623" stroke-opacity="0.45"/>
    <text x="56" y="49" font-family="'SFMono-Regular',Consolas,monospace" font-size="12" letter-spacing="1.5" fill="#f5a623">◆ GTMVP · THE PAID MEDIA OS</text>

    <text x="40" y="100" font-size="27" font-weight="800" letter-spacing="-0.4" fill="#eef1f6">For founders who still log</text>
    <text x="40" y="132" font-size="27" font-weight="800" letter-spacing="-0.4" fill="#eef1f6">into Google Ads themselves.</text>

    <text x="40" y="166" font-size="13.5" fill="#bdc7d2">Eight supervised agents audit your bidding signals,</text>
    <text x="40" y="186" font-size="13.5" fill="#bdc7d2">map competitors, and rebuild the account.</text>

    <g>
      <rect x="40" y="204" width="340" height="40" rx="9" fill="#f5a623"/>
      <text x="60" y="229" font-size="14.5" font-weight="700" fill="#1a1205">Run the free Smart Bidding Audit</text>
      <text x="352" y="229" font-size="16" font-weight="700" fill="#1a1205">→</text>
    </g>
  </g>

  <!-- divider -->
  <line x1="600" y1="32" x2="600" y2="228" stroke="#1f2530" stroke-width="1"/>

  <!-- RIGHT: the ladder -->
  <g>
    <text x="636" y="54" font-family="'SFMono-Regular',Consolas,monospace" font-size="11" letter-spacing="2.5" fill="#5a6473">THE LADDER</text>

    <!-- row 1 -->
    <text x="636" y="92" font-size="14.5" font-weight="600" fill="#eef1f6">Smart Bidding Audit</text>
    <text x="960" y="92" font-size="14.5" font-weight="700" text-anchor="end" fill="#f5a623">Free</text>
    <text x="636" y="110" font-size="11.5" fill="#8d97a6">Find the leaks, fast</text>
    <line x1="636" y1="124" x2="960" y2="124" stroke="#1f2530" stroke-width="1" stroke-dasharray="3 4"/>

    <!-- row 2 -->
    <text x="636" y="150" font-size="14.5" font-weight="600" fill="#eef1f6">Operator Diagnostic</text>
    <text x="960" y="150" font-size="14.5" font-weight="700" text-anchor="end" fill="#f5a623">$129</text>
    <text x="636" y="168" font-size="11.5" fill="#8d97a6">120-page teardown, in 24h</text>
    <line x1="636" y1="182" x2="960" y2="182" stroke="#1f2530" stroke-width="1" stroke-dasharray="3 4"/>

    <!-- row 3 -->
    <text x="636" y="208" font-size="14.5" font-weight="600" fill="#eef1f6">Done-for-You Rebuild</text>
    <text x="960" y="208" font-size="14.5" font-weight="700" text-anchor="end" fill="#f5a623">$3.5–12K/mo</text>
    <text x="636" y="226" font-size="11.5" fill="#8d97a6">20% CPA reduction guarantee</text>
  </g>
</svg>
